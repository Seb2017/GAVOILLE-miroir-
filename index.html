<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gavoille Opticiens - Expérience Miroir Pro</title>
    <style>
        :root { --red: #e60000; --black: #000; --white: #ffffff; }
        body { margin: 0; background: var(--black); font-family: 'Helvetica Neue', Arial; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; text-align: center; border-bottom: 1px solid #222; background: #000; z-index: 10; }
        .logo { font-weight: 900; letter-spacing: 5px; font-size: 1.8rem; }
        .tagline { color: var(--red); font-size: 0.8rem; letter-spacing: 2px; margin-top: 5px; }

        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }

        /* Miroir */
        .mirror-section { flex: 1.5; position: relative; border-radius: 30px; overflow: hidden; border: 2px solid #333; background: #111; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 150px; font-weight: 900; color: var(--red); display: none; text-shadow: 0 0 30px black; z-index: 100; }

        /* Galerie */
        .gallery-section { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; }
        .photo-slot { background: #1a1a1a; border-radius: 15px; overflow: hidden; position: relative; border: 2px solid #333; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot-tag { position: absolute; top: 10px; left: 10px; background: var(--red); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Boutons */
        .controls { padding: 30px; display: flex; justify-content: center; align-items: center; gap: 50px; border-top: 1px solid #222; background: #000; z-index: 10; }
        .capture-group { text-align: center; cursor: pointer; }
        .btn-shot { width: 80px; height: 80px; background: white; border: 6px solid var(--red); border-radius: 50%; margin-bottom: 10px; transition: 0.2s; }
        .btn-finish { background: var(--red); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; display: none; box-shadow: 0 0 20px rgba(230,0,0,0.4); }

        /* Modal Social */
        #social-modal { display: none; position: fixed; inset: 0; background: var(--black); z-index: 2000; flex-direction: column; align-items: center; padding: 20px; text-align: center; overflow-y: auto; }
        #final-collage { width: 100%; max-width: 450px; border-radius: 20px; margin: 20px 0; box-shadow: 0 0 40px rgba(255,255,255,0.1); }
        .social-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .btn-share { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: white; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .btn-reset { background: #222; color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">GAVOILLE <span style="color:var(--red)">OPTICIENS</span></div>
    <div class="tagline">SUBLIMEZ VOTRE REGARD</div>
</header>

<div class="main-container">
    <div class="mirror-section">
        <video id="video" autoplay playsinline></video>
        <div id="countdown">3</div>
    </div>

    <div class="gallery-section">
        <div class="photo-slot" id="slot-1"><div class="slot-tag">A</div></div>
        <div class="photo-slot" id="slot-2"><div class="slot-tag">B</div></div>
        <div class="photo-slot" id="slot-3"><div class="slot-tag">C</div></div>
        <div class="photo-slot" id="slot-4"><div class="slot-tag">D</div></div>
    </div>
</div>

<div class="controls">
    <div class="capture-group" onclick="startCountdown()">
        <div class="btn-shot"></div>
        <span style="font-weight: bold; font-size: 0.8rem; letter-spacing: 1px;">Sourire !</span>
    </div>
    
    <button id="btn-compare" class="btn-finish" onclick="buildFinal()">PARTAGER MON STYLE ➔</button>
</div>

<div id="social-modal">
    <h2 style="margin:0; color:var(--red);">C'EST SUBLIME !</h2>
    <p style="color: #aaa; margin-top: 5px;">Cliquez sur le bouton pour partager</p>
    
    <img id="final-collage" src="">

    <div class="social-grid">
        <button class="btn-share" onclick="shareToInsta()">📤 PARTAGER / PUBLIER</button>
        <button class="btn-reset" onclick="location.reload()">RECOMMENCER</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const countDiv = document.getElementById('countdown');
    let photos = [null, null, null, null];
    let current = 0;
    window.sharedFile = null;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

    function startCountdown() {
        let timer = 3; countDiv.innerText = timer; countDiv.style.display = "block";
        const interval = setInterval(() => {
            timer--;
            if(timer > 0) countDiv.innerText = timer;
            else { clearInterval(interval); countDiv.style.display = "none"; takePhoto(); }
        }, 800);
    }

    function takePhoto() {
        const ctx = canvas.getContext('2d');
        const vW = video.videoWidth; const vH = video.videoHeight;
        canvas.width = vW; canvas.height = vH;
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const data = canvas.toDataURL('image/jpeg', 0.9);
        photos[current % 4] = data;
        const labels = ['A', 'B', 'C', 'D'];
        document.getElementById(`slot-${(current % 4) + 1}`).innerHTML = `<img src="${data}"><div class="slot-tag">${labels[current % 4]}</div>`;
        current++; if(current >= 2) document.getElementById('btn-compare').style.display = "block";
    }

    function buildFinal() {
        const collage = document.createElement('canvas');
        const img = new Image();
        img.src = photos[0];
        img.onload = () => {
            const pW = img.width;
            const pH = img.height;
            collage.width = pW * 2 + 30;
            // CORRECTION CALCULE HAUTEUR : On ajoute la hauteur du footer
            collage.height = pH * 2 + 380; // 2 rows + marges + footer plus grand pour les tags
            
            const ctx = collage.getContext('2d');
            ctx.fillStyle = "white"; ctx.fillRect(0,0,collage.width, collage.height);

            const pos = [[10,10], [pW + 20, 10], [10, pH + 20], [pW + 20, pH + 20]];
            const labels = ['A', 'B', 'C', 'D'];
            let loaded = 0;
            const activePhotos = photos.filter(p => p !== null);

            photos.forEach((p, i) => {
                if(!p) return;
                const pImg = new Image();
                pImg.onload = () => {
                    ctx.drawImage(pImg, pos[i][0], pos[i][1], pW, pH);
                    const badgeSize = (collage.width / 20);
                    ctx.fillStyle = "#e60000";
                    ctx.beginPath(); ctx.arc(pos[i][0]+badgeSize+10, pos[i][1]+badgeSize+10, badgeSize, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "white"; ctx.font = `bold ${badgeSize+10}px Arial`; ctx.textAlign="center";
                    ctx.fillText(labels[i], pos[i][0]+badgeSize+10, pos[i][1]+badgeSize+badgeSize/3+10);
                    loaded++;
                    if(loaded === activePhotos.length) {
                        const footTop = pH * 2 + 30; // CORRECTION PLACEMENT FOOTER
                        ctx.fillStyle = "#000"; ctx.fillRect(0, footTop, collage.width, collage.height - footTop);
                        
                        ctx.fillStyle = "white"; ctx.font = `bold ${collage.width / 15}px Helvetica`; ctx.textAlign="center";
                        ctx.fillText("GAVOILLE OPTICIENS", collage.width/2, footTop + 120);
                        
                        ctx.fillStyle = "#e60000"; ctx.font = `bold ${collage.width / 25}px Helvetica`;
                        ctx.fillText("QUEL EST VOTRE CHOIX PRÉFÉRÉ ?", collage.width/2, footTop + 200);
                        
                        // CORRECTION AJOUT BANDEAU HASHTAGS (INSPIRÉ DE CLAUDE)
                        const tagFootTop = footTop + 280;
                        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, tagFootTop, collage.width, collage.height - tagFootTop);
                        ctx.fillStyle = "#aaa"; ctx.font = `normal ${collage.width / 45}px Helvetica`; ctx.textAlign="left";
                        ctx.fillText("#GavoilleOpticiens #HésitationLunettes #Optician #JassansRiottier #0437554043", 50, tagFootTop + 60);

                        const finalDataUrl = collage.toDataURL('image/jpeg', 0.95);
                        document.getElementById('final-collage').src = finalDataUrl;
                        document.getElementById('social-modal').style.display = "flex";
                        collage.toBlob(blob => {
                            window.sharedFile = new File([blob], "choix-style-gavoille.jpg", { type: "image/jpeg" });
                        }, 'image/jpeg');
                    }
                };
                pImg.src = p;
            });
        }
    }

    async function shareToInsta() {
        if (navigator.share && window.sharedFile) {
            try { await navigator.share({ files: [window.sharedFile], title: 'Gavoille Opticiens', text: 'Aidez-moi à choisir !' });
            } catch (err) { }
        } else { alert("Partage non supporté."); }
    }
</script>
</body>
</html>
