<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miroir GAVOILLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --gavoille-red: #ff0000; /* Le rouge vif demandé */
            --gavoille-black: #000000;
        }

        body {
            margin: 0; padding: 0;
            background: var(--gavoille-black);
            font-family: 'Arial', sans-serif;
            color: white; height: 100vh; display: flex; flex-direction: column;
        }

        header { 
            padding: 20px; 
            text-align: center; 
            background: #111;
            border-bottom: 2px solid var(--gavoille-red);
        }

        .logo-gavoille { 
            color: var(--gavoille-red); 
            font-weight: 900; 
            font-size: 2.2rem; 
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .main-container { display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden; }

        .mirror-section {
            flex: 1.8; position: relative; background: #000;
            border-radius: 20px; overflow: hidden; border: 2px solid #333;
        }

        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .gallery-section {
            flex: 1; display: grid; grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr; gap: 10px;
        }

        .photo-slot {
            background: #1a1a1a; border-radius: 12px; overflow: hidden;
            position: relative; border: 2px solid #333; transition: all 0.3s;
        }

        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }

        .btn-red {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            background: var(--gavoille-red); color: white; border: none;
            padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
        }

        .controls { padding: 25px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        /* Bouton de capture principal ROUGE */
        .capture-btn {
            width: 90px; height: 90px; 
            background: var(--gavoille-red); 
            border-radius: 50%;
            border: 6px solid white; 
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .capture-btn:active { transform: scale(0.9); }

        /* Fenêtre Modale */
        #qr-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center;
        }

        .modal-content {
            background: white; padding: 30px; border-radius: 25px; text-align: center; color: black;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-gavoille">GAVOILLE</div>
</header>

<div class="main-container">
    <div class="mirror-section">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="gallery-section">
        <div class="photo-slot" id="slot-1"></div>
        <div class="photo-slot" id="slot-2"></div>
        <div class="photo-slot" id="slot-3"></div>
        <div class="photo-slot" id="slot-4"></div>
    </div>
</div>

<div class="controls">
    <button class="capture-btn" onclick="takeSnapshot()"></button>
    <p style="text-transform: uppercase; letter-spacing: 1px; font-size: 14px;">Appuyez pour comparer vos lunettes</p>
</div>

<div id="qr-modal">
    <div class="modal-content">
        <h2 style="margin:0">GAVOILLE OPTICIENS</h2>
        <div id="qrcode"></div>
        <p>Scannez pour retrouver la boutique sur Instagram</p>
        <button style="background:#000; color:#fff; border:none; padding:12px 25px; border-radius:10px;" onclick="closeModal()">RETOUR AU MIROIR</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let slotIndex = 1;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Veuillez autoriser la caméra pour le miroir Gavoille"));

    function takeSnapshot() {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.translate(canvas.width, 0);
        context.scale(-1, 1);
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL('image/png');
        const slot = document.getElementById(`slot-${slotIndex}`);
        
        slot.innerHTML = `
            <img src="${imageData}">
            <button class="btn-red" onclick="generateQR()">PARTAGER</button>
        `;
        slot.style.borderColor = "var(--gavoille-red)";
        
        slotIndex = (slotIndex % 4) + 1;
    }

    function generateQR() {
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: "https://www.instagram.com/gavoilleopticiens/", 
            width: 200, height: 200
        });
        document.getElementById("qr-modal").style.display = "flex";
    }

    function closeModal() { document.getElementById("qr-modal").style.display = "none"; }
</script>

</body>
</html>
