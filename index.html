<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAVOILLE - Miroir Connecté</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --red: #e60000; --black: #111; --gray: #f4f4f4; }
        body { 
            margin: 0; background: var(--black); font-family: 'Century Gothic', sans-serif; 
            color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .logo { font-size: 1.8rem; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; }
        
        .main { display: flex; flex: 1; padding: 20px; gap: 20px; align-items: stretch; }
        
        /* Miroir Principal */
        .mirror-box { 
            flex: 1.5; border: 1px solid #444; border-radius: 8px; position: relative; 
            background: #000; overflow: hidden; 
        }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Galerie de droite */
        .grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; }
        .slot { 
            background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #333;
            position: relative; transition: all 0.3s;
        }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot-btn { 
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            background: rgba(0,0,0,0.5); font-size: 10px; padding: 5px 0; text-transform: uppercase;
        }

        /* Barre de contrôle */
        .bar { height: 120px; display: flex; justify-content: space-around; align-items: center; padding: 0 50px; }
        .btn-reset { border: 1px solid #666; background: transparent; color: #999; padding: 10px 20px; border-radius: 30px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .shutter { width: 80px; height: 80px; background: white; border-radius: 50%; border: 6px solid #333; cursor: pointer; }
        .shutter:active { transform: scale(0.9); background: var(--red); }
        .hint { color: #666; font-size: 0.8rem; max-width: 150px; text-align: center; }

        /* Pop-up QR */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:99; justify-content:center; align-items:center; flex-direction:column; }
        .modal-box { background:white; padding:40px; border-radius:20px; color:black; text-align:center; }
    </style>
</head>
<body>

<header>
    <div class="logo">GAVOILLE <span style="color:var(--red)">OPTICIENS</span></div>
</header>

<div class="main">
    <div class="mirror-box">
        <video id="video" autoplay playsinline></video>
    </div>
    <div class="grid">
        <div class="slot" id="s1" onclick="showQR(1)"></div>
        <div class="slot" id="s2" onclick="showQR(2)"></div>
        <div class="slot" id="s3" onclick="showQR(3)"></div>
        <div class="slot" id="s4" onclick="showQR(4)"></div>
    </div>
</div>

<div class="bar">
    <button class="btn-reset" onclick="location.reload()">Nouveau look</button>
    <div class="shutter" onclick="snap()"></div>
    <div class="hint">Appuyez pour comparer vos styles</div>
</div>

<div id="modal">
    <div class="modal-box">
        <div id="qrcode"></div>
        <p style="margin-top:20px">Scannez pour partager votre style</p>
        <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:10px; border:none; padding:10px 20px; background:var(--red); color:white; border-radius:5px;">Fermer</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let count = 1;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => video.srcObject = s);

    function snap() {
        if(count > 4) count = 1;
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        
        const img = canvas.toDataURL('image/png');
        const slot = document.getElementById('s' + count);
        slot.innerHTML = `<img src="${img}"><div class="slot-btn">Scanner</div>`;
        slot.style.borderColor = "var(--red)";
        count++;
    }

    function showQR(id) {
        const slot = document.getElementById('s' + id);
        if(slot.innerHTML === "") return;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: "https://www.instagram.com/gavoilleopticiens/",
            width: 200, height: 200
        });
        document.getElementById('modal').style.display = "flex";
    }
</script>
</body>
</html>
