<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GAVOILLE - Miroir Connecté</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --red: #e60000; --gold: #c5a059; --bg: #0a0a0a; }
        body { 
            margin: 0; background: var(--bg); font-family: 'Helvetica Neue', sans-serif; 
            color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* En-tête luxe */
        header { 
            padding: 25px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, var(--bg));
            border-bottom: 0.5px solid #333;
        }
        .logo { font-weight: 200; letter-spacing: 6px; font-size: 1.4rem; text-transform: uppercase; }

        .main { display: flex; flex: 1; padding: 25px; gap: 25px; height: 60%; }

        /* Miroir avec bords arrondis et reflet */
        .mirror-box {
            flex: 1.6; position: relative; border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); border: 1px solid #333; background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Flash blanc au moment de la photo */
        #flash {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: white; opacity: 0; pointer-events: none; transition: opacity 0.1s;
        }

        /* Slots de comparaison verticaux pour l'élégance */
        .gallery { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .slot { 
            background: #151515; border-radius: 12px; position: relative; 
            border: 1px solid #222; transition: all 0.3s; overflow: hidden;
        }
        .slot img { width: 100%; height: 100%; object-fit: cover; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }

        /* Contrôles */
        .footer { padding: 40px; display: flex; justify-content: space-around; align-items: center; }
        
        .btn-capture {
            width: 90px; height: 90px; border-radius: 50%; border: 3px solid white;
            background: transparent; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-capture:active { transform: scale(0.9); border-color: var(--red); }
        .inner-circle { width: 70px; height: 70px; border-radius: 50%; background: white; }

        .btn-reset { 
            padding: 12px 25px; border-radius: 30px; border: 1px solid #444;
            background: transparent; color: #888; font-size: 0.9rem; cursor: pointer;
        }

        /* Modal QR Code style Apple */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-card {
            background: white; color: black; padding: 40px; border-radius: 30px;
            text-align: center; width: 300px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">GAVOILLE <span style="font-weight: 600; color:var(--red)">OPTICIENS</span></div>
</header>

<div class="main">
    <div class="mirror-box">
        <video id="video" autoplay playsinline></video>
        <div id="flash"></div>
    </div>

    <div class="gallery">
        <div class="slot" id="s1" onclick="openShare(this)"></div>
        <div class="slot" id="s2" onclick="openShare(this)"></div>
        <div class="slot" id="s3" onclick="openShare(this)"></div>
        <div class="slot" id="s4" onclick="openShare(this)"></div>
    </div>
</div>

<div class="footer">
    <button class="btn-reset" onclick="location.reload()">NOUVEL ESSAYAGE</button>
    <button class="btn-capture" onclick="capture()">
        <div class="inner-circle"></div>
    </button>
    <div style="width: 130px; color: #555; font-size: 0.8rem;">Appuyez pour comparer vos styles</div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h2 style="margin-top:0">Partager</h2>
        <div id="qrcode" style="margin: 20px 0;"></div>
        <p style="color:#666">Scannez pour retrouver <br>votre sélection</p>
        <button class="btn-reset" style="background:#000; color:#fff; width:100%" onclick="document.getElementById('modal').style.display='none'">FERMER</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const flash = document.getElementById('flash');
    let count = 1;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280 } })
        .then(s => video.srcObject = s);

    function capture() {
        // Effet Flash
        flash.style.opacity = 1;
        setTimeout(() => flash.style.opacity = 0, 100);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);

        const data = canvas.toDataURL('image/jpeg', 0.8);
        const slot = document.getElementById('s' + count);
        slot.innerHTML = `<img src="${data}"><div style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%); font-size:10px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:10px;">SCANNER</div>`;
        
        count = (count % 4) + 1;
    }

    function openShare(el) {
        if(!el.querySelector('img')) return;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: "https://www.instagram.com/gavoilleopticiens/", // Ici on mettra votre lien
            width: 200, height: 200
        });
        document.getElementById('modal').style.display = 'flex';
    }
</script>
</body>
</html>
