<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gavoille Opticiens - Miroir Social</title>
    <style>
        :root { --red: #e60000; --black: #000; --white: #ffffff; }
        body { margin: 0; background: var(--black); font-family: 'Helvetica Neue', Arial; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 10px; text-align: center; border-bottom: 1px solid #222; background: #000; flex-shrink: 0; }
        .logo { font-weight: 900; letter-spacing: 3px; font-size: 1.4rem; }
        .tagline { color: var(--red); font-size: 0.7rem; font-weight: bold; margin-top: 2px; }

        /* Mise en page adaptative */
        .main-container { display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden; flex-direction: column; }
        
        @media (min-width: 768px) { .main-container { flex-direction: row; } }

        .mirror-section { flex: 1.5; position: relative; border-radius: 20px; overflow: hidden; border: 2px solid #333; background: #111; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: 900; color: var(--red); display: none; text-shadow: 0 0 20px black; z-index: 100; }

        .gallery-section { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        @media (min-width: 768px) { .gallery-section { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; } }

        .photo-slot { background: #1a1a1a; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #333; aspect-ratio: 1/1; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot-tag { position: absolute; top: 5px; left: 5px; background: var(--red); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; }

        .controls { padding: 20px; display: flex; justify-content: center; align-items: center; gap: 30px; background: #000; border-top: 1px solid #222; flex-shrink: 0; }
        .btn-shot { width: 60px; height: 60px; background: white; border: 5px solid var(--red); border-radius: 50%; transition: 0.2s; cursor: pointer; }
        .btn-finish { background: var(--red); color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; cursor: pointer; display: none; }

        #social-modal { display: none; position: fixed; inset: 0; background: var(--black); z-index: 2000; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        #final-collage { width: 100%; max-width: 400px; border-radius: 15px; margin: 15px 0; }
        .social-grid { display: grid; gap: 10px; width: 100%; max-width: 400px; }
        .btn-share { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: white; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">GAVOILLE <span style="color:var(--red)">OPTICIENS</span></div>
    <div class="tagline">SUBLIMEZ VOTRE REGARD</div>
</header>

<div class="main-container">
    <div class="mirror-section">
        <video id="video" autoplay playsinline></video>
        <div id="countdown">3</div>
    </div>
    <div class="gallery-section">
        <div class="photo-slot" id="slot-1"><div class="slot-tag">A</div></div>
        <div class="photo-slot" id="slot-2"><div class="slot-tag">B</div></div>
        <div class="photo-slot" id="slot-3"><div class="slot-tag">C</div></div>
        <div class="photo-slot" id="slot-4"><div class="slot-tag">D</div></div>
    </div>
</div>

<div class="controls">
    <div style="text-align:center" onclick="startCountdown()"><div class="btn-shot"></div></div>
    <button id="btn-compare" class="btn-finish" onclick="buildFinal()">PARTAGER ➔</button>
</div>

<div id="social-modal">
    <h2 style="margin:0; color:var(--red); font-size: 1.2rem;">C'EST SUBLIME !</h2>
    <img id="final-collage" src="">
    <div class="social-grid">
        <button class="btn-share" onclick="shareToInsta()">📤 PARTAGER / PUBLIER</button>
        <button onclick="location.reload()" style="background:#222; color:white; border:none; padding:15px; border-radius:12px;">RECOMMENCER</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const countDiv = document.getElementById('countdown');
    let photos = [null, null, null, null];
    let current = 0;
    window.sharedFile = null;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s).catch(() => alert("Caméra requise"));

    function startCountdown() {
        let t = 3; countDiv.innerText = t; countDiv.style.display = "block";
        const i = setInterval(() => { t--; if(t>0) countDiv.innerText=t; else { clearInterval(i); countDiv.style.display="none"; takePhoto(); }}, 800);
    }

    function takePhoto() {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        const data = canvas.toDataURL('image/jpeg', 0.8);
        photos[current % 4] = data;
        document.getElementById(`slot-${(current % 4) + 1}`).innerHTML = `<img src="${data}"><div class="slot-tag"></div>`;
        current++; if(current >= 2) document.getElementById('btn-compare').style.display = "block";
    }

    function buildFinal() {
        const collage = document.createElement('canvas');
        const img = new Image(); img.src = photos[0];
        img.onload = () => {
            const w = img.width, h = img.height;
            collage.width = w*2+30; collage.height = h*2+350;
            const ctx = collage.getContext('2d');
            ctx.fillStyle="white"; ctx.fillRect(0,0,collage.width, collage.height);
            const pos = [[10,10], [w+20, 10], [10, h+20], [w+20, h+20]];
            const labels = ['A','B','C','D'];
            let done = 0;
            photos.forEach((p, i) => {
                if(!p) return;
                const pI = new Image(); pI.onload = () => {
                    ctx.drawImage(pI, pos[i][0], pos[i][1], w, h);
                    ctx.fillStyle="#e60000"; ctx.beginPath(); ctx.arc(pos[i][0]+50, pos[i][1]+50, 40, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle="white"; ctx.font="bold 45px Arial"; ctx.textAlign="center"; ctx.fillText(labels[i], pos[i][0]+50, pos[i][1]+65);
                    done++; if(done === photos.filter(x=>x).length) {
                        const ft = h*2+30; ctx.fillStyle="#000"; ctx.fillRect(0, ft, collage.width, collage.height-ft);
                        ctx.fillStyle="white"; ctx.font="bold 60px Helvetica"; ctx.textAlign="center"; ctx.fillText("GAVOILLE OPTICIENS", collage.width/2, ft+110);
                        ctx.fillStyle="#e60000"; ctx.font="bold 35px Helvetica"; ctx.fillText("QUEL EST VOTRE CHOIX PRÉFÉRÉ ?", collage.width/2, ft+190);
                        ctx.fillStyle="#888"; ctx.font="25px Helvetica"; ctx.fillText("#GavoilleOpticiens #HésitationLunettes #JassansRiottier", collage.width/2, ft+270);
                        document.getElementById('final-collage').src = collage.toDataURL('image/jpeg', 0.9);
                        document.getElementById('social-modal').style.display="flex";
                        collage.toBlob(b => { window.sharedFile = new File([b], "gavoille.jpg", {type:"image/jpeg"}); });
                    }
                }; pI.src = p;
            });
        };
    }

    async function shareToInsta() {
        if (navigator.share && window.sharedFile) {
            try { await navigator.share({ files: [window.sharedFile], title: 'Gavoille', text: 'Aidez-moi à choisir !' }); } catch(e){}
        } else { alert("Utilisez la capture d'écran pour partager."); }
    }
</script>
</body>
</html>
