<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gavoille Opticiens - Sublimez votre regard</title>
    <style>
        :root { --red: #e60000; --black: #1a1a1a; --gray: #f4f4f4; }
        body { margin: 0; background: var(--black); font-family: 'Segoe UI', Roboto, sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .logo { font-weight: 800; letter-spacing: 3px; font-size: 1.8rem; text-transform: uppercase; }
        .tagline { color: #888; font-size: 0.9rem; margin-top: 5px; }

        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; }

        /* Le Miroir */
        .mirror-section { flex: 1.5; position: relative; border-radius: 20px; overflow: hidden; border: 4px solid #333; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Galerie */
        .gallery-section { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; }
        .photo-slot { background: #222; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #444; transition: all 0.3s; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        /* Commandes */
        .controls { padding: 25px; display: flex; justify-content: center; align-items: center; gap: 40px; background: #111; }
        .btn { border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; background: none; color: white; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        
        .capture-btn { width: 80px; height: 80px; background: white; border-radius: 50%; border: 6px solid var(--red); }
        .share-btn { background: var(--red); padding: 15px 25px; border-radius: 50px; font-weight: bold; font-size: 1rem; }

        /* Modal pour le résultat final */
        #result-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #result-image { max-width: 90%; max-height: 70%; border-radius: 10px; border: 5px solid white; }
        .modal-btns { margin-top: 20px; display: flex; gap: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">GAVOILLE <span style="color:var(--red)">Opticiens</span></div>
    <div class="tagline">SUBLIMEZ VOTRE REGARD</div>
</header>

<div class="main-container">
    <div class="mirror-section">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="gallery-section">
        <div class="photo-slot" id="slot-1"><div class="slot-label">Choix 1</div></div>
        <div class="photo-slot" id="slot-2"><div class="slot-label">Choix 2</div></div>
        <div class="photo-slot" id="slot-3"><div class="slot-label">Choix 3</div></div>
        <div class="photo-slot" id="slot-4"><div class="slot-label">Choix 4</div></div>
    </div>
</div>

<div class="controls">
    <button class="btn" onclick="takeSnapshot()">
        <div class="capture-btn"></div>
        <span>PRENDRE UNE PHOTO</span>
    </button>

    <button class="btn share-btn" id="btn-compare" style="display:none;" onclick="createCollage()">
        CRÉER MON COMPARATIF
    </button>
</div>

<div id="result-modal">
    <h2 style="margin-bottom:10px;">Quelle paire préférez-vous ?</h2>
    <p style="margin-bottom:20px;">Enregistrez l'image pour l'envoyer à vos amis</p>
    <img id="result-image" src="">
    <div class="modal-btns">
        <button class="btn share-btn" onclick="closeModal()">RETOUR</button>
        <button class="btn" style="background:white; color:black; padding:15px 25px; border-radius:50px; font-weight:bold;" onclick="downloadImage()">ENREGISTRER</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let photos = [null, null, null, null];
    let slotIndex = 0;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Erreur : " + err));

    function takeSnapshot() {
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 800;
        ctx.translate(800, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, 800, 800);
        
        const data = canvas.toDataURL('image/jpeg', 0.8);
        photos[slotIndex] = data;
        
        const slot = document.getElementById(`slot-${slotIndex + 1}`);
        slot.innerHTML = `<img src="${data}"><div class="slot-label">Choix ${slotIndex + 1}</div>`;
        slot.style.borderColor = "var(--red)";

        slotIndex = (slotIndex + 1) % 4;
        
        // Afficher le bouton comparatif dès qu'on a au moins 2 photos
        if(photos.filter(p => p !== null).length >= 2) {
            document.getElementById('btn-compare').style.display = "block";
        }
    }

    function createCollage() {
        const collageCanvas = document.createElement('canvas');
        collageCanvas.width = 1200;
        collageCanvas.height = 1200;
        const ctx = collageCanvas.getContext('2d');

        // Fond
        ctx.fillStyle = "white";
        ctx.fillRect(0,0,1200,1200);

        const positions = [[0,0], [600,0], [0,600], [600,600]];
        let loaded = 0;

        photos.forEach((p, i) => {
            if(!p) return;
            const img = new Image();
            img.src = p;
            img.onload = () => {
                ctx.drawImage(img, positions[i][0], positions[i][1], 595, 595);
                loaded++;
                if(loaded === photos.filter(p => p !== null).length) {
                    // Ajouter le logo/texte
                    ctx.fillStyle = "black";
                    ctx.font = "bold 40px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText("GAVOILLE OPTICIENS - Quel est votre choix ?", 600, 1180);
                    
                    document.getElementById('result-image').src = collageCanvas.toDataURL('image/jpeg');
                    document.getElementById('result-modal').style.display = "flex";
                }
            };
        });
    }

    function closeModal() { document.getElementById('result-modal').style.display = "none"; }
    
    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'choix-gavoille.jpg';
        link.href = document.getElementById('result-image').src;
        link.click();
    }
</script>

</body>
</html>
